<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- dark card background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>

  <!-- Column 1 — blue (Backlog/In Progress) -->
  <rect x="4"  y="5" width="6" height="3" rx="1"   fill="#58a6ff" opacity="0.9"/>
  <rect x="4"  y="9" width="6" height="6" rx="1.5" fill="#1a2a40"/>
  <rect x="4.5" y="9.5" width="1.5" height="5" rx="0.5" fill="#58a6ff" opacity="0.85"/>
  <rect x="4"  y="16" width="6" height="6" rx="1.5" fill="#1a2a40"/>
  <rect x="4.5" y="16.5" width="1.5" height="5" rx="0.5" fill="#58a6ff" opacity="0.85"/>
  <rect x="4"  y="23" width="6" height="5" rx="1.5" fill="#1a2a40"/>
  <rect x="4.5" y="23.5" width="1.5" height="4" rx="0.5" fill="#58a6ff" opacity="0.6"/>

  <!-- Column 2 — amber (In Review) -->
  <rect x="13" y="5" width="6" height="3" rx="1"   fill="#d29922" opacity="0.9"/>
  <rect x="13" y="9" width="6" height="6" rx="1.5" fill="#2a2010"/>
  <rect x="13.5" y="9.5" width="1.5" height="5" rx="0.5" fill="#d29922" opacity="0.85"/>
  <rect x="13" y="16" width="6" height="6" rx="1.5" fill="#2a2010"/>
  <rect x="13.5" y="16.5" width="1.5" height="5" rx="0.5" fill="#d29922" opacity="0.85"/>

  <!-- Column 3 — green (Done) -->
  <rect x="22" y="5" width="6" height="3" rx="1"   fill="#3fb950" opacity="0.9"/>
  <rect x="22" y="9" width="6" height="6" rx="1.5" fill="#0f2a14"/>
  <rect x="22.5" y="9.5" width="1.5" height="5" rx="0.5" fill="#3fb950" opacity="0.85"/>
  <!-- checkmark on done card -->
  <path d="M24.5 12.5 L26 14 L29.5 10.5" stroke="#3fb950" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
