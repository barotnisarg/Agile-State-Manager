<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Icon mark (64×64 region) ── -->
  <g filter="url(#iconGlow)">
    <!-- card background -->
    <rect x="8" y="8" width="48" height="48" rx="10" fill="url(#bgGrad)"/>
    <rect x="8" y="8" width="48" height="48" rx="10" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

    <!-- Column 1 — blue -->
    <rect x="14" y="14" width="11" height="4"  rx="1.5" fill="#58a6ff" opacity="0.95"/>
    <rect x="14" y="20" width="11" height="9"  rx="2"   fill="#1a2a40"/>
    <rect x="15" y="21" width="2.5" height="7"  rx="1"   fill="#58a6ff" opacity="0.9"/>
    <rect x="14" y="31" width="11" height="9"  rx="2"   fill="#1a2a40"/>
    <rect x="15" y="32" width="2.5" height="7"  rx="1"   fill="#58a6ff" opacity="0.7"/>
    <rect x="14" y="42" width="11" height="7"  rx="2"   fill="#1a2a40" opacity="0.7"/>
    <rect x="15" y="43" width="2.5" height="5"  rx="1"   fill="#58a6ff" opacity="0.45"/>

    <!-- Column 2 — amber -->
    <rect x="28.5" y="14" width="11" height="4" rx="1.5" fill="#d29922" opacity="0.95"/>
    <rect x="28.5" y="20" width="11" height="9" rx="2"   fill="#2a2010"/>
    <rect x="29.5" y="21" width="2.5" height="7" rx="1"  fill="#d29922" opacity="0.9"/>
    <rect x="28.5" y="31" width="11" height="9" rx="2"   fill="#2a2010"/>
    <rect x="29.5" y="32" width="2.5" height="7" rx="1"  fill="#d29922" opacity="0.7"/>

    <!-- Column 3 — green -->
    <rect x="43" y="14" width="11" height="4"  rx="1.5" fill="#3fb950" opacity="0.95"/>
    <rect x="43" y="20" width="11" height="9"  rx="2"   fill="#0f2a14"/>
    <rect x="44" y="21" width="2.5" height="7"  rx="1"   fill="#3fb950" opacity="0.9"/>
    <!-- checkmark = done -->
    <path d="M47 25 L49.5 28 L54.5 22" stroke="#3fb950" stroke-width="1.6" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── Wordmark ── -->
  <!-- "Agile" — larger, gradient -->
  <text x="76" y="30"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="800" letter-spacing="-0.8px"
    fill="url(#textGrad)">
    Agile
  </text>

  <!-- "State Manager" — smaller, muted -->
  <text x="77" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" font-weight="500" letter-spacing="0.5px"
    fill="#8b949e">
    STATE MANAGER
  </text>

  <!-- accent dot between words — small colored dot after "Agile" -->
  <circle cx="148" cy="24" r="3" fill="#a371f7" opacity="0.85" filter="url(#subtleGlow)"/>
</svg>
