<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agile State Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    
    <nav id="navbar">
      <h1>Agile State Manager</h1>
      <button id="addTaskButton">Add Task</button>
    </nav>

    <div id="modalOverlay" class="hidden">
      <div class="modalContent">
        <form>
          <h2>Add New Task</h2>
          <input
            type="text"
            id="taskTitle"
            placeholder="Enter the Title of Task"
            required
          /><br /><br />

          <input
            type="text"
            id="taskDescription"
            placeholder="Enter the Description of Task"
            required
          /><br /><br />

          <button type="submit">Add</button>
          <button type="button" id="closeModal">Cancel</button>
        </form>
      </div>
    </div>

    <div id="full">
      <div id="main">
        <div id="backlog" class="state">
            <h2>Backlog</h2>
        </div>
        <div id="inProgress" class="state">
            <h2>In Progress</h2>
        </div>
        <div id="inReview" class="state">
            <h2>In Review</h2>
        </div>
        <div id="done" class="state">
            <h2>Done</h2>
        </div>
        <div id="blocked" class="state">
            <h2>Blocked</h2>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
